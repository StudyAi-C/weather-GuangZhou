<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3月29日海珠体育中心天气</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; background: #f0f4f8; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .alert-card { background: #ffebee; border-left: 6px solid #d32f2f; color: #b71c1c; display: none; }
        h2 { margin-top: 0; color: #1976d2; }
        .hour-list { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; }
        .hour-item { min-width: 90px; background: #e3f2fd; padding: 12px 8px; border-radius: 10px; text-align: center; flex-shrink: 0; border: 2px solid transparent; }
        .hour-item.rainy { border-color: #d32f2f; background: #ffebee; color: #d32f2f; }
        .tip { background: #fff9c4; padding: 15px; border-radius: 8px; border-left: 5px solid #fbc02d; color: #f57f17; }
        .footer { text-align: right; color: #888; font-size: 0.85em; margin-top: 5px; }
        .error-box { color: #d32f2f; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ffcdd2; }
        .code-block { background: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.9em; margin-top: 10px; overflow-x: auto; }
    </style>
</head>
<body>

    <!-- 分钟级降水预警 -->
    <div id="minutely-alert" class="card alert-card">
        <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 8px;">⛈️ 降水预警</div>
        <div id="minutely-content">正在分析雨情...</div>
    </div>

    <!-- 主天气卡片 -->
    <div class="card">
        <h2>🌤️ 3月29日 海珠区体育中心</h2>
        <div id="weather-container">
            <div style="text-align: center; color: #666;">正在加载天气数据...</div>
        </div>
        <div class="footer" id="update-time"></div>
    </div>

    <!-- 温馨提示 -->
    <div id="tip-container" class="tip">正在生成建议...</div>

    <script>
        // =========================================================
        // ================= 【必须修改】配置区域 =================
        // =========================================================
        
        // 请在此处粘贴你在和风天气控制台获取的 API Key
        const API_KEY = "902af698d72a4634aeff18d0dfc9bdd0"; 
        
        // 海珠体育中心经纬度
        const LOCATION = "113.32,23.14"; 
        
        // 目标日期
        const TARGET_DATE = "2026-03-29"; 
        
        // =========================================================

        /**
         * 主函数
         */
        async function loadWeather() {
            const container = document.getElementById("weather-container");
            const updateTime = document.getElementById("update-time");
            
            try {
                console.log("🔍 正在请求天气数据...");
                console.log("   使用的Key:", API_KEY);

                // 1. 请求逐小时预报 (根据和风天气文档: /v7/weather/168h)
                const url = `https://devapi.qweather.com/v7/weather/168h?location=${LOCATION}&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();

                console.log("📡 API返回结果:", data);

                // 2. 检查状态码 (根据文档，code为 "200" 代表成功)
                if (data.code !== "200") {
                    throw new Error(`API错误 [${data.code}]: ${data.referral || data.message || '未知错误'}`);
                }

                // 3. 筛选目标日期数据
                const targetDayData = data.hourly.filter(item => item.fxTime.startsWith(TARGET_DATE));
                
                if (targetDayData.length === 0) {
                     container.innerHTML = `<div style="text-align:center; color:#666;">暂无数据（如果现在距离3月29日超过7天，API可能还未放出预报）</div>`;
                     return;
                }

                // 4. 检查是否需要分钟级降水
                let minutelyData = null;
                const willRain = targetDayData.slice(0, 12).some(h => h.text.includes('雨') || parseInt(h.pop) > 50);
                
                if (willRain) {
                    try {
                        const minUrl = `https://devapi.qweather.com/v7/minutely/5m?location=${LOCATION}&key=${API_KEY}`;
                        const minRes = await fetch(minUrl);
                        const minData = await minRes.json();
                        if (minData.code === "200") minutelyData = minData;
                    } catch (e) { console.error("分钟级数据获取失败", e); }
                }

                // 5. 渲染
                renderMinutelyAlert(minutelyData);
                renderHourlyList(targetDayData);
                generateTip(targetDayData);
                updateTime.innerText = "最后更新: " + new Date().toLocaleString();

            } catch (err) {
                console.error("❌ 发生错误:", err);
                renderError(err.message);
            }
        }

        function renderError(msg) {
            const container = document.getElementById("weather-container");
            let helpText = "";
            
            if (msg.includes("401") || msg.includes("Invalid key")) {
                helpText = "解决方法：请检查 API Key 是否复制正确，且在控制台选择的是「API KEY」类型（不是JWT）。";
            } else if (msg.includes("403") || msg.includes("banned") || msg.includes("permission")) {
                helpText = "解决方法：请回到和风天气控制台，确保该Key的「IP白名单」和「域名白名单」是完全空白的。";
            } else if (msg.includes("404")) {
                helpText = "解决方法：经纬度格式错误，请检查是否为 经度,纬度 格式。";
            }

            container.innerHTML = `
                <div class="error-box">
                    <strong>❌ 加载失败</strong>
                    <p>${msg}</p>
                    ${helpText ? `<p style="margin-top:10px; font-size:0.9em;">💡 <strong>${helpText}</strong></p>` : ''}
                    <div style="margin-top:15px;">
                        <small>调试步骤：</small>
                        <ol style="font-size:0.85em; margin-top:5px;">
                            <li>确认已在第48行填入Key，且用英文双引号包裹。</li>
                            <li>按 F12 打开控制台，查看 Console 标签中的红色报错。</li>
                            <li>直接访问下方链接看是否有数据返回：</li>
                        </ol>
                        <div class="code-block" id="debug-url"></div>
                    </div>
                </div>
            `;
            
            document.getElementById("debug-url").innerText = `https://devapi.qweather.com/v7/weather/168h?location=${LOCATION}&key=${API_KEY}`;
        }

        function renderMinutelyAlert(data) {
            const box = document.getElementById("minutely-alert");
            if (!data) { box.style.display = "none"; return; }
            box.style.display = "block";
            document.getElementById("minutely-content").innerText = data.summary;
        }

        function renderHourlyList(data) {
            let html = '<div class="hour-list">';
            data.forEach(hour => {
                const time = hour.fxTime.split('T')[1].substring(0, 5);
                const isRainy = hour.text.includes('雨');
                html += `
                    <div class="hour-item ${isRainy ? 'rainy' : ''}">
                        <div style="font-weight:bold;">${time}</div>
                        <div>${hour.text}</div>
                        <div style="font-size:1.2em; font-weight:bold;">${hour.temp}°C</div>
                        <div style="font-size:0.8em;">💧 ${hour.pop}%</div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById("weather-container").innerHTML = html;
        }

        function generateTip(data) {
            const hasRain = data.some(h => h.text.includes('雨'));
            const maxT = Math.max(...data.map(h => parseInt(h.temp)));
            let text = hasRain ? "⚠️ 今天有雨，出门请务必带伞！" : 
                       (maxT > 30 ? "☀️ 今天炎热，注意防晒补水。" : "✅ 天气不错，预祝活动顺利！");
            document.getElementById("tip-container").innerText = text;
        }

        // 启动
        loadWeather();
        setInterval(loadWeather, 600000); // 10分钟刷新
    </script>
</body>
</html>
